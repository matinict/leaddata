[project]
name = "cf2"
version = "0.1.0"
description = "CF2 — CrewAI Video Factory (Flow-Based)"
authors = [{ name = "Matin", email = "matinict@gmail.com" }]
requires-python = ">=3.11,<3.12"
dependencies = [
  "crewai[tools,anthropic,google-genai]==1.14.5",
  "pandas>=2.0.0,<3.0.0",
  "matplotlib>=3.7.0",
  "bar_chart_race>=0.1.0",
  "static-ffmpeg>=3.0",
  "opencv-python>=4.8.0,<4.9",
  "gtts>=2.5.4",
  "edge-tts>=7.2.7",
  "piper-tts>=1.4.1",
  "openai-whisper>=20250625",
  "litellm>=1.75.3",
  "dashscope>=1.25.13",
  "huggingface-hub>=0.36.2",
  "google-api-python-client>=2.192.0",
  "google-auth>=2.48.0",
  "google-auth-oauthlib>=1.3.0",
  "google-auth-httplib2>=0.3.0",
  "tiktok-uploader>=1.2.0",
  "selenium>=4.41.0",
  "playwright-stealth>=2.0.2",
  "requests>=2.32.5",
  "httpx>=0.28.1",
  "python-dotenv>=1.1.1",
  "langchain-core==0.3.37",
  "llama-api-client>=0.6.0",
  "torch>=2.12.0",
  "torchaudio>=2.11.0",
  "torchvision>=0.20.0",
  "transformers>=4.44.0,<5",
  "coqui-tts[codec]>=0.27.5",
  "paddleocr>=2.7.3",
  "paddlepaddle>=3.0.0",
  "numpy>=1.24,<2",
  "easyocr>=1.7.2",
  "pytesseract>=0.3.13",
  "pillow>=12.2.0",
  "rich>=14.3.4",
]

[tool.uv]
environments = ["sys_platform == 'linux'"]

override-dependencies = [
  "langchain-core==0.3.37",
  # --- CPU-ONLY PROTECTION: block all GPU wheels ---
  "triton>=0; python_version < '0'",
  "nvidia-cublas-cu12>=0; python_version < '0'",
  "nvidia-cuda-nvrtc-cu12>=0; python_version < '0'",
  "nvidia-cuda-runtime-cu12>=0; python_version < '0'",
  "nvidia-cudnn-cu12>=0; python_version < '0'",
  "nvidia-cufft-cu12>=0; python_version < '0'",
  "nvidia-curand-cu12>=0; python_version < '0'",
  "nvidia-cusolver-cu12>=0; python_version < '0'",
  "nvidia-cusparse-cu12>=0; python_version < '0'",
  "nvidia-nccl-cu12>=0; python_version < '0'",
  "nvidia-nvtx-cu12>=0; python_version < '0'",
  "nvidia-nvjitlink-cu12>=0; python_version < '0'",
  "paddlepaddle-gpu>=0; python_version < '0'",
  "onnxruntime-gpu>=0; python_version < '0'",
  "cupy-cuda12x>=0; python_version < '0'",
]

[project.scripts]
kickoff = "cf2.main:kickoff"
plot = "cf2.main:plot"

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = [{ index = "pytorch-cpu" }]
torchaudio = [{ index = "pytorch-cpu" }]
torchvision = [{ index = "pytorch-cpu" }]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.crewai]
type = "flow"
